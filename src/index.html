<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="theme-color" content="#EEEDE7" />
  <title>Quinze Cinq</title>
  <!-- Applique le thème choisi (clair/sombre/auto) AVANT le premier rendu : pas de flash. -->
  <script>
    (function () {
      try {
        var m = localStorage.getItem('q5.theme');
        var dark = m === 'sombre' ||
          (m !== 'clair' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) {
          document.documentElement.classList.add('theme-dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', '#0E0F12');
        }
      } catch (e) {}
    })();
  </script>
  <!-- Polices auto-hébergées (offline, aucun appel réseau). -->
  <link rel="stylesheet" href="./css/fonts.css" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main id="app">
    <div id="screen-root"></div>
  </main>
  <!-- Annonces lecteur d'écran (nouvelle proposition, étape de cuisine…) -->
  <div id="sr-live" class="sr-only" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
